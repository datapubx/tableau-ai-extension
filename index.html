<!DOCTYPE html>
<html>

  <head>
  <script type="text/javascript"
    src="https://tableau.github.io/extensions-api/lib/tableau.extensions.1.latest.js">
  </script>
</head>

<body>

  <button onclick="run()">Explain</button>

  <p id="result">Clique sur Explain</p>

  <script>
    async function run() {

      try {
        document.getElementById("result").innerText = "Initialisation...";

        await tableau.extensions.initializeAsync();

        document.getElementById("result").innerText = "Connexion au dashboard...";

        const dashboard = tableau.extensions.dashboardContent.dashboard;

        const worksheets = dashboard.worksheets;

        document.getElementById("result").innerText =
          "Nombre de feuilles: " + worksheets.length;

        const worksheet = worksheets[0];

        const data = await worksheet.getSummaryDataAsync();

        document.getElementById("result").innerText =
          "Nombre de lignes: " + data.data.length;

      } catch (error) {
        document.getElementById("result").innerText =
          "Erreur: " + error.message;
      }
    }
  </script>

</body>
</html>
