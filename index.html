<!DOCTYPE html>
<html>
<head>
  <script type="text/javascript"
    src="https://tableau.github.io/extensions-api/lib/tableau.extensions.1.latest.js">
  </script>
</head>

<body>

  <button onclick="run()">Explain</button>

  <p id="result">Test</p>

  <script>
    async function run() {

      if (typeof tableau === "undefined") {
        document.getElementById("result").innerText = "Tableau API NON chargée";
        return;
      }

      try {
        await tableau.extensions.initializeAsync();

        const dashboard = tableau.extensions.dashboardContent.dashboard;

        document.getElementById("result").innerText =
          "Worksheets: " + dashboard.worksheets.length;

      } catch (error) {
        document.getElementById("result").innerText =
          "Erreur: " + error.message;
      }
    }
  </script>

</body>
</html>
