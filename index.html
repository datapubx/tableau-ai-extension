<!DOCTYPE html>
<html>
<head>
  <script src="./tableau.extensions.1.latest.js"></script>
</head>

<body>

  <button onclick="run()">Explain with gemini</button>

  <p id="result">Click on Explain</p>

  <script>
    async function run() {

      try {
        document.getElementById("result").innerText = "Analyse en cours...";

        await tableau.extensions.initializeAsync();

        const dashboard = tableau.extensions.dashboardContent.dashboard;
        const worksheet = dashboard.worksheets[0];

        // 🔹 récupérer les données sélectionnées
        const marks = await worksheet.getSelectedMarksAsync();

        console.log("MARKS:", marks);

        // 🔹 sécurité : vérifier structure
        if (!marks.data || marks.data.length === 0) {
          document.getElementById("result").innerText =
            "⚠️ Aucune donnée sélectionnée";
          return;
        }

        const table = marks.data[0];

        if (!table.data || table.data.length === 0) {
          document.getElementById("result").innerText =
            "⚠️ Aucune ligne dans la sélection";
          return;
        }

        // 🔹 extraction propre des données
        const rows = table.data.map(row =>
          row.map(cell => cell.value)
        );

        console.log("ROWS:", rows);

        // 🔹 affichage debug temporaire
        document.getElementById("result").innerText =
          "Lignes: " + rows.length;

        // 🔹 appel API (Replit)
        const response = await fetch("https://95a537d1-8838-4952-b002-b299ee0bc738-00-1uf195blocmut.riker.replit.dev/explain", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data: rows })
        });

        const result = await response.json();

        // 🔹 affichage résultat IA
        document.getElementById("result").innerText = result.result;

      } catch (error) {
        console.error(error);
        document.getElementById("result").innerText =
          "Erreur: " + error.message;
      }
    }
  </script>

</body>
</html>
