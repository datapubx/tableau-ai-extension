<!DOCTYPE html>
<html>
<head>
  <script src="./tableau.extensions.1.latest.js"></script>
</head>

<body>

  <button onclick="run()">Explain this</button>

  <p id="result">Test</p>

  <script>
    async function run() {

  try {
    await tableau.extensions.initializeAsync();

    const dashboard = tableau.extensions.dashboardContent?.dashboard;

    if (!dashboard) {
      throw new Error("Dashboard non accessible");
    }

    const worksheet = dashboard.worksheets[0];

    if (!worksheet) {
      throw new Error("Aucune worksheet trouvée");
    }

    const data = await worksheet.getSummaryDataAsync();

    const rows = data.data.map(r => r.map(c => c.value));

    document.getElementById("result").innerText =
      "Lignes: " + rows.length + "\n\n" +
      JSON.stringify(rows.slice(0,5), null, 2);

  } catch (error) {
    document.getElementById("result").innerText =
      "Erreur: " + error.message;
  }
    const summary = rows.map(r => r.join(" - ")).join("\n");
  
  document.getElementById("result").innerText =
    "📊 Analyse des données sélectionnées:\n\n" + summary;
}
  </script>

</body>
</html>
