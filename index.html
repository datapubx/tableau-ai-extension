<!DOCTYPE html>
<html>
<head>
  <script src="./tableau.extensions.1.latest.js"></script>
</head>

<body>

  <button onclick="run()">Explain</button>

  <p id="result">Test</p>

  <script>
    async function run() {

  try {
    const dashboard = tableau.extensions.dashboardContent.dashboard;
    const worksheet = dashboard.worksheets[0];

    const data = await worksheet.getSummaryDataAsync();

    const rows = data.data.map(r => r.map(c => c.value));

    document.getElementById("result").innerText =
      "Lignes: " + rows.length + "\n\n" +
      JSON.stringify(rows.slice(0,5), null, 2);

  } catch (error) {
    document.getElementById("result").innerText =
      "Erreur: " + error.message;
  }
}
  </script>

</body>
</html>
